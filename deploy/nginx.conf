# ============================================================
#  LamsaDZ — Nginx reverse proxy (production)
#  Place TLS certs in ./deploy/certs/ (fullchain.pem, privkey.pem)
#  Get free certs with: certbot certonly --webroot ...
# ============================================================

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name lamsadz.dz www.lamsadz.dz;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name lamsadz.dz www.lamsadz.dz;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers (Helmet covers most; these reinforce at the edge)
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    client_max_body_size 8M;            # allow product image uploads
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Serve static assets directly (faster) with long cache
    location /css/   { proxy_pass http://app:3000; expires 7d; add_header Cache-Control "public"; }
    location /js/    { proxy_pass http://app:3000; expires 7d; add_header Cache-Control "public"; }
    location /img/   { proxy_pass http://app:3000; expires 7d; add_header Cache-Control "public"; }
    location /uploads/ { proxy_pass http://app:3000; expires 7d; add_header Cache-Control "public"; }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
