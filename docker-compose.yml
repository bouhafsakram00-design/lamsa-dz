# ============================================================
#  LamsaDZ — Docker Compose (app + persistent volumes)
#  Usage:
#    cp .env.example .env   # then edit secrets
#    docker compose up -d --build
# ============================================================
services:
  app:
    build: .
    image: lamsadz:latest
    container_name: lamsadz-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      # Persist the SQLite database, uploaded images and logs across restarts
      - lamsadz_db:/app/db
      - lamsadz_uploads:/app/public/uploads
      - lamsadz_logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/robots.txt',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Optional reverse proxy with TLS. Uncomment & configure for production.
  # nginx:
  #   image: nginx:alpine
  #   container_name: lamsadz-nginx
  #   restart: unless-stopped
  #   depends_on: [app]
  #   ports: ["80:80", "443:443"]
  #   volumes:
  #     - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./deploy/certs:/etc/nginx/certs:ro

volumes:
  lamsadz_db:
  lamsadz_uploads:
  lamsadz_logs:
