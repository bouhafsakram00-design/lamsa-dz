# ============================================================
#  LamsaDZ — Render.com deployment blueprint
#  Render reads this file automatically and sets everything up.
#  Docs: https://render.com/docs/blueprint-spec
# ============================================================
services:
  - type: web
    name: lamsadz
    runtime: node
    plan: free                # change to "starter" ($7/mo) to keep it always-on
    region: frankfurt         # closest Render region to Algeria
    branch: main
    # Install dependencies on deploy
    buildCommand: npm install
    # IMPORTANT (free tier): the filesystem is wiped on every restart/wake-up,
    # so we (re)build + seed the database right before starting the server.
    # This guarantees your 22 products are always present. "migrate" and "seed"
    # are both idempotent, so this is safe to run on every boot.
    startCommand: npm run migrate && npm run seed && npm start
    healthCheckPath: /robots.txt

    # NOTE: Render's FREE tier does not support persistent disks.
    # Without a disk, the database + uploaded images live on the temporary
    # filesystem and RESET on every deploy/restart. That's fine for testing.
    # On each boot we re-create the DB and reload your seed products so the
    # site is always populated (see buildCommand above).
    # 👉 To keep data permanently: upgrade to the "starter" plan and
    #    re-add the disk block (see render-with-disk.yaml for the snippet).

    envVars:
             # Pin Node to v20 — newer versions (e.g. 26) fail to build better-sqlite3
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
        - key: PORT
        value: 3000
      # (Free tier: no disk — DB & uploads use the app's default local paths
      #  and reset on each deploy. Re-seeded automatically on every build.)
      # Render auto-generates a strong random session secret for you
      - key: SESSION_SECRET
        generateValue: true
      - key: SECURE_COOKIES
        value: "true"
      # 👇 EDIT THESE in the Render dashboard after first deploy (or here before)
      - key: SITE_URL
        value: https://lamsadz.onrender.com
      - key: ADMIN_EMAIL
        value: admin@lamsadz.dz
      - key: ADMIN_PASSWORD
        sync: false           # you'll type this secretly in the dashboard
      - key: ADMIN_NAME
        value: Akram
      - key: WHATSAPP_NUMBER
        value: "213796472662"
      - key: STORE_NAME
        value: LamsaDZ
      - key: STORE_ADDRESS
        value: Hai 119 Logements, Tissemsilt, Algeria
      - key: STORE_PHONE
        value: "+213 796 472 662"
      - key: GA_MEASUREMENT_ID
        value: ""
